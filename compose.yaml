services:
  db:
    image: mysql:8.0
    container_name: fav-exchange-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fav_exchange
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3307:3306"
    volumes:
      - fav_exchange_mysql_data:/var/lib/mysql

volumes:
  fav_exchange_mysql_data: